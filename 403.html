<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - AITU Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body style="background-color: var(--bg-light); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">

    <div style="background: var(--white); border: 1px solid var(--border-color); max-width: 500px; padding: 40px; border-radius: 12px; box-shadow: var(--card-shadow); text-align: center;">
        <div style="margin: 0 auto 24px auto; display: flex; align-items: center; justify-content: center; width: 80px; height: 80px; border-radius: 50%; background: #fee2e2; color: #ef4444;">
            <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>
        <h1 style="color: var(--primary-dark); font-size: 2rem; font-weight: 800; margin-bottom: 12px;">Access Denied</h1>
        <p style="color: var(--text-gray); font-size: 1rem; line-height: 1.6; margin-bottom: 30px;">
            You do not have the required permissions to view this administrative resource. If you believe this is an error, please contact the system administrator.
        </p>
        
        <div style="display: flex; gap: 15px; justify-content: center;">
            <a href="login.html" class="btn-outline" style="display: inline-flex; align-items: center; gap: 8px;">
                Switch Account
            </a>
            <a href="repository.html" class="btn-primary" style="display: inline-flex; align-items: center; gap: 8px;">
                Back to Repository
            </a>
        </div>
    </div>

</body>
</html>
