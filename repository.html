<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Repository - AITU Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

    <div id="app"></div>

    <div class="selection-bar" id="selectionBar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="background: #3b82f6; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold;" id="selectedCount">0</span>
            <span>Files Selected</span>
        </div>
        <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.3);"></div>
        <button id="selectAllBtn">Select All</button>
        <button class="primary" id="downloadSelectedBtn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 5px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            Download Selected
        </button>
    </div>

    <script type="module" src="js/pages/repository.js"></script>
</body>
</html>
