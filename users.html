<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management - AITU Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div id="app"></div>

    <div class="modal-overlay" id="addUserModal">
        <div class="upload-modal" style="max-width: 600px;">
            <div class="modal-header">
                <h3>Add New User Account</h3>
                <svg class="close-modal" id="closeAddUserBtn" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </div>
            
            <form id="addUserForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="newUsername" class="form-control" placeholder="j.doe" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="newPassword" class="form-control" placeholder="******" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="newEmail" class="form-control" placeholder="j.doe@university.edu" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="newPhone" class="form-control" placeholder="+1 555-0000">
                </div>

                <div class="form-group">
                    <label>Role / Department</label>
                    <select id="newRole" class="form-control" required>
                        <option value="Supervisor">Supervisor</option>
                        <option value="IT Manager">IT Manager</option>
                        <option value="EL Manager">EL Manager</option>
                        <option value="Mechanic Manager">Mechanic Manager</option>
                    </select>
                </div>

                <div class="modal-actions" style="margin-top: 25px;">
                    <button type="button" class="btn-outline" id="cancelAddUserBtn">Cancel</button>
                    <button type="submit" class="btn-primary">+ Create Account</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/pages/users.js"></script>
</body>
</html>
